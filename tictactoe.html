<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 2px rgba(233, 69, 96, 0.5);
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    X wins: <span id="scoreX">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="scoreDraw">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="scoreO">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init(keepScores = false) {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      if (!keepScores) scores = { X: 0, O: 0, draw: 0 };
      render();
      updateStatus(`Player ${current}'s turn`);
    }

    function render() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => move(i));
        el.appendChild(cell);
      });
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreDraw').textContent = scores.draw;
    }

    function move(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      const win = checkWin();
      if (win) {
        gameOver = true;
        scores[current]++;
        render();
        highlight(win);
        updateStatus(`Player ${current} wins!`);
      } else if (board.every(Boolean)) {
        gameOver = true;
        scores.draw++;
        render();
        updateStatus("It's a draw!");
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
        updateStatus(`Player ${current}'s turn`);
      }
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function highlight(combo) {
      const cells = document.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('reset').addEventListener('click', () => init(true));

    init();
  </script>
</body>
</html>
